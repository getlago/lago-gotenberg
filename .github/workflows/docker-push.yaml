name: Build and Push to Docker Hub

on:
  push:
    tags:
      - '*'

jobs:
  build:
    strategy:
      matrix:
        platform:
          - name: linux/amd64
            runner: ubuntu-24.04
          - name: linux/arm64
            runner: ubuntu-24.04-arm

    name: Build Gotenberg Image (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform.name }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: getlago/lago-gotenberg
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=image,name=getlago/lago-gotenberg,push-by-digest=true,name-canonical=true,push=true

      - name: Export Digest
        run: |
          mkdir -p ./_tmp/${{ github.run_id }}/${{ github.run_attempt }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "./_tmp/${{ github.run_id }}/${{ github.run_attempt }}/digests/${digest#sha256:}"

      - name: Upload Digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ./_tmp/${{ github.run_id }}/${{ github.run_attempt }}/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Clean up
        if: always()
        run: |
          [ -e ./_tmp/${{ github.run_id }}/${{ github.run_attempt }}/digests ] && \
          rm -rf ./_tmp/${{ github.run_id }}/${{ github.run_attempt }}/digests
  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Digest
        uses: actions/download-artifact@v4
        with:
          path: ./_tmp/${{ github.run_id}}/${{ github.run_attempt }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: getlago/lago-gotenberg
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create manifest and push
        working-directory: ./_tmp/${{ github.run_id }}/${{ github.run_attempt}}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'getlago/lago-gotenberg@sha256:%s ' *)

      - name: Inspect Image
        run: |
          docker buildx imagetools inspect getlago/lago-gotenberg:${{ github.ref_name }}

      - name: Clean up
        if: always()
        run: |
          [ -e ./_tmp/${{ github.run_id }}/${{ github.run_attempt }}/digests ] && \
          rm -rf ./_tmp/${{ github.run_id }}/${{ github.run_attempt }}/digests
